<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題管理</title>
    <link rel="icon" type="image/x-icon" href="icon/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">

    <!-- デザインはCSSファイル -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">

    <!-- JavaScriptはjs下に　※apiとuiの宣言順番は変えない -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    
</head>

<body>

    <!-- クラス選択画面 -->
    <div id="class-selection-ui">
        <div id="loading-ui">
            <div class="loader"></div>
            <div>クラス情報を取得中...</div>
        </div>
        <div class="class-selection-container" id="class-selection-container" style="display: none;">
            <div class="class-selection-title">クラスを選択してください</div>
            <div class="class-list-container" id="class-list-buttons">
                <!-- クラスボタンがここに追加される -->
            </div>
            <div class="new-class-group">
                <p style="margin-top:0; font-weight:bold; color:#666;">リストにない場合は新規作成</p>
                <input type="text" id="new-class-input" class="new-class-input" placeholder="例: 3-4issR8">
                <button class="new-class-btn" onclick="createNewClass()">作成</button>
            </div>
            <button class="btn" style="margin-top: 20px; background:#eee;" onclick="closeClassSelection()"
                id="close-selection-btn" style="display:none;">キャンセル</button>
        </div>
    </div>

    <header>
        <div class="menu-label" onclick="promptClassChange()" id="header-class-name">未設定<br>課題リスト</div>
    
        <button class="refresh-btn" onclick="refreshTasks()" title="データ更新">
            <span class="refresh-icon">🔄</span>
        </button>

        <button class="add-btn" onclick="openAddModal()">新たな課題の追加</button>
    </header>

    <main id="task-list" class="task-grid"></main>

    <div id="status-msg">チョークで書き込み中...</div>

    <!-- ネイティブ風ポップアップ -->
    <div id="native-popup" class="native-popup" aria-live="assertive">
        <div class="popup-card">
            <div class="popup-message" id="native-popup-message"></div>
            <div class="popup-actions" id="native-popup-actions"></div>
        </div>
    </div>

    <!-- 課題追加モーダル -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2 class="modal-title">課題の追加</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label>
                        科目名
                        <input type="text" id="add-subject" placeholder="例: 数学">
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        課題名
                        <input type="text" id="add-title" placeholder="例: プリントP10~15">
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        詳細
                        <textarea id="add-detail" rows="3" placeholder="提出方法や補足など"></textarea>
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        期限 (yyyy/mm/dd hh:mm)                        
                        <!-- type="datetime-local"が便利 -->
                        <input type="datetime-local" id="add-deadline">
                    </label>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="closeModals()">キャンセル</button>
                <button class="btn btn-primary" onclick="submitTask()">追加する</button>
            </div>
        </div>
    </div>

    <!-- 課題詳細・削除モーダル -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <div class="detail-header">
                <div class="detail-subject" id="detail-subject">科目名</div>
                <button class="btn btn-danger" id="detail-delete-btn">削除</button>
            </div>
            <h2 class="modal-title" id="detail-title" style="border:none; margin-bottom:10px;">課題名</h2>
            <div class="modal-body">
                <div style="white-space: pre-wrap; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd;"
                    id="detail-desc">詳細</div>
                <div style="margin-top: 15px; text-align: right; font-weight: bold; font-size: 1.2rem; color: #d9534f;"
                    id="detail-deadline">期限</div>
            </div>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(registration => console.log('SW registered'))
                .catch(error => console.log('SW registration failed'));
        }
    </script>
</body>
</html>
