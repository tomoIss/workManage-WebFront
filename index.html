<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>課題管理</title>
    <link rel="icon" type="image/x-icon" href="icon/favicon.ico">
    <!-- fontsの読み込みを早め遅延を減らす -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap">
    <!-- fonts通常の読み込み（非同期読み込み） -->
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <!-- デザインはCSSファイル -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- JavaScriptはjs下に　※apiとuiの宣言順番は変えない -->
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>

    <link rel="manifest" href="manifest.json">
    
</head>

<body>

    <!-- クラス選択画面 -->
    <div id="class-selection-ui">
        <div id="loading-ui">
            <div class="loader"></div>
            <div>クラス情報を取得中...</div>
        </div>
        <div class="class-selection-container" id="class-selection-container" style="display: none;">
            <div class="class-selection-title">クラスを選択してください</div>
            <div class="class-list-container" id="class-list-buttons">
                <!-- クラスボタンがここに追加される -->
            </div>
            
            <!-- 選択式入力フォーム（セレクトボックス）-->
            <div class="new-class-group">
                <p style="margin-top:0; font-weight:bold; color:#666;">リストにない場合は新規作成</p>
                <div style="display: flex; gap: 6px; margin-bottom: 10px;">
                    <select id="new-class-grade" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                        <option value="1">1年</option>
                        <option value="2">2年</option>
                        <option value="3">3年</option>
                    </select>
                    <select id="new-class-class" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                        <option value="1">1組</option>
                        <option value="2">2組</option>
                        <option value="3">3組</option>
                        <option value="4">4組</option>
                        <option value="5">5組</option>
                        <option value="6">6組</option>
                        <option value="7">7組</option>
                        <option value="8">8組</option>
                        <option value="9">9組</option>
                    </select>
                    <select id="new-class-school" style="flex: 1; padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
                        <option value="iss" selected>iss</option>
                    </select>
                </div>
                <button class="new-class-btn" style="width: 100%; padding: 10px;" onclick="createNewClass()">作成</button>
            </div>
            <button class="btn" style="margin-top: 20px; background:#eee;" onclick="closeClassSelection()"
                id="close-selection-btn" style="display:none;">キャンセル</button>
        </div>
    </div>

    <header>
        <div class="menu-label" onclick="promptClassChange()" id="header-class-name">未設定<br>課題リスト</div>
    
        <button class="refresh-btn" onclick="refreshTasks()" title="データ更新">
            <span class="refresh-icon">🔄</span>
        </button>

        <button class="add-btn" onclick="openAddModal()">新たな課題の追加</button>
    </header>

    <main id="task-list" class="task-grid"></main>

    <div id="status-msg">チョークで書き込み中...</div>

    <!-- ネイティブ風ポップアップ -->
    <div id="native-popup" class="native-popup" aria-live="assertive">
        <div class="popup-card">
            <div class="popup-message" id="native-popup-message"></div>
            <div class="popup-actions" id="native-popup-actions"></div>
        </div>
    </div>

    <!-- 課題追加モーダル -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <h2 class="modal-title">課題の追加</h2>
            <div class="modal-body">
                <div class="form-group">
                    <label>
                        科目名
                        <input type="text" id="add-subject" placeholder="例: 数学">
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        課題名
                        <input type="text" id="add-title" placeholder="例: プリントP10~15">
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        詳細
                        <textarea id="add-detail" rows="3" placeholder="提出方法や補足など"></textarea>
                    </label>
                </div>
                <div class="form-group">
                    <label>
                        期限 (yyyy/mm/dd hh:mm)                        
                        <!-- type="datetime-local"が便利 -->
                        <input type="datetime-local" id="add-deadline">
                    </label>
                </div>
            </div>
            <div class="btn-group">
                <button class="btn" onclick="closeModals()">キャンセル</button>
                <button class="btn btn-primary" onclick="submitTask()">追加する</button>
            </div>
        </div>
    </div>

    <!-- 課題詳細・削除モーダル -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModals()">&times;</span>
            <div class="detail-header">
                <div class="detail-subject" id="detail-subject">科目名</div>
                <button class="btn btn-danger" id="detail-delete-btn">削除</button>
            </div>
            <h2 class="modal-title" id="detail-title" style="border:none; margin-bottom:10px;">課題名</h2>
            <div class="modal-body">
                <div style="white-space: pre-wrap; background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd;"
                    id="detail-desc">詳細</div>
                <div style="margin-top: 15px; text-align: right; font-weight: bold; font-size: 1.2rem; color: #d9534f;"
                    id="detail-deadline">期限</div>
            </div>
        </div>
    </div>

    <!-- 初期ユーザー名設定モーダル -->
    <div id="username-init-modal" class="modal" style="display: none; z-index: 2000; background: rgba(0,0,0,0.85);">
        <div class="modal-content" style="max-width: 360px; text-align: center;">
            <h2 style="margin-top: 0; font-size: 1.3rem; color: #4dadf7;">初期設定</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px; color: #ccc;">あなたの情報を選択してください。</p>
            
            <!-- 学年・クラスの選択 -->
            <div style="display: flex; gap: 8px; margin-bottom: 15px; text-align: left;">
                <div style="flex: 1;">
                    <label style="display:block; font-size: 0.82rem; margin-bottom: 5px; color: #aaa;">学年</label>
                    <select id="init-grade" style="width: 100%; padding: 10px; border-radius: 6px; background: #2b2b2b; color: #fff; border: 1px solid #444;">
                        <option value="1" selected>1年</option>
                        <option value="2">2年</option>
                        <option value="3">3年</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="display:block; font-size: 0.82rem; margin-bottom: 5px; color: #aaa;">クラス</label>
                    <select id="init-class" style="width: 100%; padding: 10px; border-radius: 6px; background: #2b2b2b; color: #fff; border: 1px solid #444;">
                        <option value="1" selected>1組</option>
                        <option value="2">2組</option>
                        <option value="3">3組</option>
                        <option value="4">4組</option>
                        <option value="5">5組</option>
                        <option value="6">6組</option>
                        <option value="7">7組</option>
                        <option value="8">8組</option>
                        <option value="9">9組</option>
                    </select>
                </div>
            </div>

            <!-- 出席番号の選択（01〜42） -->
            <div style="text-align: left; margin-bottom: 15px;">
                <label style="display:block; font-size: 0.82rem; margin-bottom: 5px; color: #aaa;">出席番号</label>
                <select id="init-attendance" style="width: 100%; padding: 10px; border-radius: 6px; background: #2b2b2b; color: #fff; border: 1px solid #444;">
                    <option value="01" selected>01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option>
                    <option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option>
                    <option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option>
                    <option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option>
                    <option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option>
                    <option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option>
                    <option value="31">31</option><option value="32">32</option><option value="33">33</option><option value="34">34</option><option value="35">35</option>
                    <option value="36">36</option><option value="37">37</option><option value="38">38</option><option value="39">39</option><option value="40">40</option>
                    <option value="41">41</option><option value="42">42</option>
                </select>
            </div>

            <!-- 学校コードの選択 -->
            <div style="text-align: left; margin-bottom: 25px;">
                <label style="display:block; font-size: 0.82rem; margin-bottom: 5px; color: #aaa;">学校コード</label>
                <select id="init-school" style="width: 100%; padding: 10px; border-radius: 6px; background: #2b2b2b; color: #fff; border: 1px solid #444;">
                    <option value="iss" selected>iss</option>
                </select>
            </div>

            <button onclick="submitInitialUsername()" style="width: 100%; padding: 12px; background: #4dadf7; color: #fff; border: none; border-radius: 6px; font-weight: bold; font-size: 1rem; cursor: pointer;">
                設定を完了する
            </button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) {
            // scopeを './' に指定することで、このリポジトリ内だけを管理対象にする
            navigator.serviceWorker.register('sw.js', { scope: './' })
                .then(registration => console.log('SW registered with scope:', registration.scope))
                .catch(error => console.log('SW registration failed:', error));
        }
    </script>
</body>
</html>
